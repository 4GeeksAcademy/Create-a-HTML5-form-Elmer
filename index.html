<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="https://kit.fontawesome.com/f43036c0cd.js" crossorigin="anonymous"></script>
</head>
<body>
    
    <div class="card col-10 mx-auto my-5">
        <h3 class="card-header">
            Payment form example
        </h3>
        <div class="container-fluid p-4">
            <div class="row alert alert-danger">Some fields are missing</div>
        </div>

        
        <div class="container-fluid pb-5">
            <div class="row justify-content-between">
                <div class="mb-3 col-5">           
                    <label for="exampleFormControlInput1" class="form-label bold">Card #</label>
                    <input type="email" class="form-control" id="exampleFormControlInput1" placeholder="xxxxxxxxxxxxxxxx">
                </div>
                <div class="mb-3 col-3">
                    <label for="exampleFormControlTextarea1" class="form-label bold">CVC #</label>
                    <input type="email" class="form-control" id="exampleFormControlInput1" placeholder="000">
                </div>
                 <div class="mb-3 col-4">           
                    <label for="exampleFormControlInput1" class="form-label bold">Amount</label>
                    <div class="d-flex align-item-center">
                        <p>$</p> 
                        <input type="email" class="form-control" id="exampleFormControlInput1" placeholder="Amount">
                    </div> 
                </div>

                 <div class="mb-3 col-6">           
                    <label for="exampleFormControlInput1" class="form-label bold">First Name</label>
                    <input type="email" class="form-control" id="exampleFormControlInput1" placeholder="">
                </div>
                <div class="mb-3 col-6">
                    <label for="exampleFormControlTextarea1" class="form-label bold">Last Name</label>
                    <input type="email" class="form-control" id="exampleFormControlInput1" placeholder="">
                </div>

                <div class="mb-3 col-6">
                    <label for="exampleFormControlTextarea1" class="form-label bold">City</label>
                    <input type="email" class="form-control" id="exampleFormControlInput1" placeholder="">
                </div>
                <div class="mb-3 col-3">
                    <label for="exampleFormControlTextarea1" class="form-label bold">City</label>
                    <select class="form-select custom-double-arrow" aria-label="Selector múltiple">
                        <option selected>Pick a state</option>
                        <option value="1">Guadalajara</option>
                        <option value="2">Jalisco</option>
                        <option value="3">CD MX</option>
                    </select>
                </div>
                 <div class="mb-3 col-3">
                    <label for="exampleFormControlTextarea1" class="form-label bold">Postal Code</label>
                    <input type="email" class="form-control" id="exampleFormControlInput1" placeholder="">
                </div>

                <div class="col-3">
                    <label for="exampleFormControlInput1" class="form-label">We acept:</label>
                                        
                    <div class="d-flex bg-secondary rounded p-3 justify-content-evenly col-12"> 

                        <div class="form-check form-check-inline col-2">
                            <input class="form-check-input" type="radio" name="radioDefault" id="radioDefault1">
                            
                            <i class="fa-brands fa-cc-mastercard fs-5" style="color: rgb(255, 255, 255);"></i>
                        </div>

                        <div class="form-check form-check-inline col-2">
                            <input class="form-check-input" type="radio" name="radioDefault" id="radioDefault1">
                            <i class="form-check-icon fa-brands fa-cc-visa fs-5" style="color: rgb(255, 255, 255);"></i>
                        </div>

                        <div class="form-check form-check-inline col-2">
                            <input class="form-check-input" type="radio" name="radioDefault" id="radioDefault1">
                            <i class="fa-brands fa-cc-diners-club fs-5" style="color: rgb(255, 255, 255);"></i>
                        </div>

                        <div class="form-check form-check-inline col-2">
                            <input class="form-check-input" type="radio" name="radioDefault" id="radioDefault1">
                            <i class="fa-brands fa-cc-amex fs-5" style="color: rgb(255, 255, 255);"></i>
                        </div>

                    </div>

                </div>

                <div class="mb-3 col-6">           
                    <label for="exampleFormControlInput1" class="form-label bold">Message</label>
                    <textarea class="form-control" id="exampleFormControlTextarea1" rows="4" ></textarea>
                    <div id="notesblock" class="form-text">
                        Add any notes here.
                    </div>
                </div>

            </div>


            
            
           
        </div>
        
        
        <div class="container-fluid card-footer text-end">
            <div class="flex-row col-12">
                <a href="#" class="btn btn-secondary">Cancel</a>
                <a href="#" class="btn btn-primary">Send</a>
            </div>
           
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
</body>
</html>
